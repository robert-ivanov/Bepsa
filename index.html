<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store - Checkout</title>
<style>
    .checkout-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
    }
    .checkout-iframe {
        width: 100%;
        height: 680px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    @media (max-width: 768px) {
        .checkout-iframe { height: 600px; }
    }
</style>
</head>
<body>

<section class="checkout-container">
    <h1>Complete Purchase</h1>

    <iframe
        id="dinelcoCheckout"
        name="dinelcoCheckout"
        class="checkout-iframe"
        title="Dinelco Checkout">
    </iframe>

    <form
        id="checkoutForm"
        method="POST"
        target="dinelcoCheckout"
        style="display: none;">
        <input type="hidden" name="JWT" id="integrityToken">
    </form>
</section>

<script>
    // Direct Dinelco validate URL — as per official docs
    const validateUrl = "https://dev-sgwf-01.bepsa.com.py/d/api/checkout-session/validate";

    async function getIntegrityToken(orderData) {
        try {
            const response = await fetch('/api/create-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            return data.integrityToken;
        } catch (error) {
            console.error('Error getting token:', error);
            return null;
        }
    }

    function initCheckout(integrityToken) {
        if (!integrityToken) {
            console.error('Integrity token is required');
            return;
        }
        document.getElementById('integrityToken').value = integrityToken;
        document.getElementById('checkoutForm').action = validateUrl;
        document.getElementById('checkoutForm').submit();
        console.log('Checkout started successfully');
    }

    document.addEventListener('DOMContentLoaded', async function () {
        console.log('Getting session token...');

        const orderData = {
            clientReferenceId: "vkg_ds10",
            amount: 1000,
            currency: "PYG",
            targetOrigin: "https://bepsa.vercel.app",
            returnUrl: "https://bepsa.vercel.app/payment-status",
            callbackUrl: "https://webhook.site/2912a6be-167e-49d6-a9bc-a53e63e01fc4",
            lineItems: [
                {
                    name: "Product 1",
                    description: "Product 1",
                    price: 100000,
                    quantity: 1,
                    img: "https://example.com/image.jpg"
                }
            ],
            metadata: { orderId: "ORD-010" },
            customer: {
                customerId: "CUST-12345",
                name: "Fernando",
                lastname: "López",
                email: "fernando.lopez@email.com",
                phone: "+595991000000"
            }
        };

        const token = await getIntegrityToken(orderData);

        if (token) {
            console.log('Token obtained, starting checkout...');
            initCheckout(token);
        } else {
            console.error('Could not obtain session token');
            alert('Error initializing checkout. Please try again.');
        }
    });

    // Listen for payment result from Dinelco iframe
    window.addEventListener('message', function (event) {
        const validOrigins = ['https://dev-sgwf-01.bepsa.com.py'];
        if (!validOrigins.includes(event.origin)) return;

        const data = event.data;
        console.log('Payment event:', data);

        switch (data.paymentStatus) {
            case 'payment.success':
                console.log('Payment successful!');
                // TODO: redirect or show success UI
                break;
            case 'payment.failed':
                console.log('Payment failed.');
                // TODO: show error UI
                break;
        }
    });
</script>

</body>
</html>
